# Two-job CI:
#   • `build` runs on every push to main, every PR, and manual triggers —
#     produces an unsigned installer attached to the run as a workflow artifact
#     so contributors / testers can grab the latest dev build at any time.
#   • `release` runs only on `v*` tag pushes — signs the installer + latest.json
#     and publishes a GitHub Release. Existing installs auto-update from this.
#
# Prereqs (one-time setup):
#   1. Public key is already in src-tauri/tauri.conf.json (we generated it).
#   2. Add the private-key file contents as repo secret TAURI_SIGNING_PRIVATE_KEY.
#      The key has NO password, so TAURI_SIGNING_PRIVATE_KEY_PASSWORD stays empty
#      (still required by the action — set it to "" or just an empty secret).
#   3. Set the GitHub repo URL placeholders in src-tauri/tauri.conf.json
#      (plugins.updater.endpoints).
#
# Releasing:
#   - Bump version in package.json + src-tauri/tauri.conf.json + src-tauri/Cargo.toml
#   - git commit -am "release: vX.Y.Z" && git tag vX.Y.Z
#   - git push origin main --tags
# A signed release appears under GitHub Releases ~10 min later; installed apps
# auto-update via Check for updates.

name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (unsigned)
    # Skip when this push is a release tag — the `release` job handles that.
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install npm deps
        run: npm ci

      - name: Fetch bundled ffmpeg
        run: npm run fetch-binaries

      - name: Build app + installers (no signing)
        run: npm run tauri:build

      - name: Upload installers as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeEdit-${{ github.sha }}
          retention-days: 14
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  release:
    name: Release (signed + published)
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install npm deps
        run: npm ci

      - name: Fetch bundled ffmpeg
        run: npm run fetch-binaries

      - name: Build + sign + publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # tauri.release.conf.json overlays createUpdaterArtifacts: true so
          # latest.json + signatures get generated; local builds skip signing.
          args: "--config src-tauri/tauri.release.conf.json"
          tagName: ${{ github.ref_name }}
          releaseName: "WeEdit ${{ github.ref_name }}"
          releaseBody: |
            Download the `.msi` or setup `.exe` below to install.
            Existing users get the update via **Check for updates** in the hamburger menu.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
