# nginx site for the WeEdit signaling server — Cloudflare in front.
#
# Cloudflare terminates TLS at its edge and proxies to this origin over plain
# HTTP, so there's NO certificate to manage here. Set the Cloudflare SSL/TLS mode
# to "Flexible" (edge→origin over HTTP:80) — or "Full" if you also put a cert on
# the origin, which isn't required.
#
# Cloudflare proxies WebSockets automatically on proxied (orange-cloud) records,
# so wss://weedit.minecartchris.cc reaches here as a normal ws upgrade.
#
# Place at /etc/nginx/sites-available/weedit and symlink into sites-enabled.
#
# Note: Cloudflare's orange-cloud proxy can only reach standard origin ports
# (80, 443, 8080, …) — NOT 4444. That's why nginx fronts the node server on :80.
# The node server itself also listens on :4444 directly (handy for LAN testing).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name weedit.minecartchris.cc;

    location / {
        proxy_pass http://127.0.0.1:4444;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        # Real client IP comes from Cloudflare. CF-Connecting-IP carries the
        # original visitor; X-Forwarded-For chains it.
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebRTC signaling sockets are long-lived and mostly idle between
        # handshakes — keep them from timing out.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
