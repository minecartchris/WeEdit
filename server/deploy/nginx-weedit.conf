# nginx site for the WeEdit signaling server.
#
# Place at /etc/nginx/sites-available/weedit and symlink into sites-enabled.
# Terminates TLS for weedit.minecartchris.cc and proxies the WebSocket upgrade
# to the Node signaling server on 127.0.0.1:4444.
#
# TLS: run certbot AFTER the port-80 server below is live, e.g.
#   sudo certbot --nginx -d weedit.minecartchris.cc
# certbot rewrites this file to add the ssl_certificate lines + the :443 block.
# The map + upgrade headers below are what make WebSocket (wss://) work.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name weedit.minecartchris.cc;

    # certbot adds the HTTPS redirect here automatically. Until then, the proxy
    # below also serves plain ws:// for a first connectivity test.
    location / {
        proxy_pass http://127.0.0.1:4444;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebRTC signaling connections are long-lived and mostly idle between
        # handshakes — keep them from timing out.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# After certbot runs you'll have a `listen 443 ssl;` server block with the same
# `location /` proxy. If you'd rather configure TLS by hand, copy the location
# block above into a 443 server with your ssl_certificate / ssl_certificate_key.
