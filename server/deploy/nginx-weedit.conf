# nginx site for the WeEdit signaling server — Cloudflare in front.
#
# Cloudflare terminates TLS at its edge and proxies to this origin over plain
# HTTP, so there's NO certificate to manage here. Set the Cloudflare SSL/TLS mode
# to "Flexible". The app connects to wss://weedit.minecartchris.cc:8443 — 8443 is
# a Cloudflare-proxiable HTTPS port, and Cloudflare forwards to the origin on the
# same port, so nginx listens on 8443.
#
# Cloudflare proxies WebSockets automatically on proxied (orange-cloud) records,
# so wss://weedit.minecartchris.cc:8443 reaches here as a normal ws upgrade.
#
# Place at /etc/nginx/sites-available/weedit and symlink into sites-enabled.
#
# Note: Cloudflare's orange-cloud proxy can only reach its supported ports — 4444
# is NOT one of them, which is why nginx fronts the node server. The node server
# itself also listens on :4444 directly (handy for LAN testing).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    # 8443 = the Cloudflare origin port (matches the proxied edge port). 80 is
    # kept for convenient direct LAN health checks.
    listen 8443;
    listen [::]:8443;
    listen 80;
    listen [::]:80;
    server_name weedit.minecartchris.cc;

    location / {
        proxy_pass http://127.0.0.1:4444;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        # Real client IP comes from Cloudflare. CF-Connecting-IP carries the
        # original visitor; X-Forwarded-For chains it.
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebRTC signaling sockets are long-lived and mostly idle between
        # handshakes — keep them from timing out.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
