# nginx site for the WeEdit website — landing page + the browser "web copy" of
# the editor. Cloudflare can sit in front (Flexible SSL/TLS, like the signaling
# server), or you can terminate TLS here with certbot (see the commented block).
#
# Layout served (deploy roots):
#   /var/www/weedit/            -> landing page  (website/ from this repo)
#   /var/www/weedit/editor/     -> web editor    (dist-web/ from `npm run build:web`)
#
# URL map:
#   https://weedit.minecartchris.cc/          -> landing page
#   https://weedit.minecartchris.cc/editor/   -> the editor SPA (client-routed)
#
# The collaboration SIGNALING server is a SEPARATE service on port 8443
# (server/deploy/nginx-weedit-web.conf) and is unaffected by this file.
#
# !! Port :80 conflict note: the signaling config also has `listen 80;` for the
#    same server_name (it's only there for LAN health checks). Two server blocks
#    can't both own :80 for one name — remove the two `listen 80;`/`listen [::]:80;`
#    lines from server/deploy/nginx-weedit.conf so THIS site owns :80. The
#    signaling keeps :8443; nothing about collaboration changes.
#
# Place at /etc/nginx/sites-available/weedit-web and symlink into sites-enabled.

server {
    # Cloudflare terminates TLS at the edge and proxies to the origin over plain
    # HTTP on :80 (set Cloudflare SSL/TLS mode to "Flexible"). If you instead
    # terminate TLS here, use the certbot block at the bottom and drop these.
    listen 80;
    listen [::]:80;
    server_name weedit.minecartchris.cc;

    root /var/www/weedit;
    index index.html;

    # Behind Cloudflare the visitor IP arrives in CF-Connecting-IP. (Real-IP
    # restoration is optional; uncomment set_real_ip_from for Cloudflare ranges.)

    # --- Landing page (and any other top-level static assets) ---
    location / {
        try_files $uri $uri/ =404;
    }

    # --- Web editor SPA (single-page app, client-side routed) ---
    # Built with base "/editor/" (vite.web.config.ts), so all asset URLs are
    # already prefixed. Any unknown sub-path falls back to the app's index.html.
    location /editor/ {
        alias /var/www/weedit/editor/;
        try_files $uri $uri/ /editor/index.html;
    }

    # Long-cache the fingerprinted build assets; never cache the HTML shells so
    # new releases of either the site or the editor are picked up immediately.
    location ~* /assets/.*\.(js|css|woff2?|png|jpg|jpeg|svg|gif|ico|wasm)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html        { add_header Cache-Control "no-cache"; }
    location = /editor/index.html { add_header Cache-Control "no-cache"; }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml application/wasm;
    gzip_min_length 1024;
}

# ----------------------------------------------------------------------------
# Alternative: terminate TLS on this box with certbot instead of Cloudflare.
# Comment out the `listen 80` lines above, then run:
#
#   sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d weedit.minecartchris.cc
#
# certbot rewrites this server block to listen on 443 with the cert paths and
# adds an http->https redirect. Nothing else here needs to change.
# ----------------------------------------------------------------------------
